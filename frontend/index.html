<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pathogen Response System - Skeleton</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/dark/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <script type="module">
        const [Map, SceneView] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/SceneView.js",
        ]);

        const map = new Map({
            basemap: "oceans",
            ground: "world-elevation",
        });

        const view = new SceneView({
            container: "viewDiv",
            map: map,
            camera: {
                position: {
                    spatialReference: { latestWkid: 3857, wkid: 102100 },
                    x: -11262192.883555487,
                    y: 2315246.351026253,
                    z: 18161244.728082635,
                },
                heading: 0,
                tilt: 0.49,
            },
            viewingMode: "global",
            environment: {
                background: { type: "color", color: [10, 14, 26, 1] },
                atmosphereEnabled: true,
                starsEnabled: true
            },
            ui: { components: [] }
        });
    </script>

    <script type="module" src="socket_handler.js"></script>
    <script type="module" src="ui_updates.js"></script>
</head>

<body>
    <div id="viewDiv"></div>

    <div id="sidePanel">
        <div class="panel-header">Pathogen Response System</div>

        <div class="stats-section">
            <div class="stat-row">
                <span class="stat-label">Utility Score</span>
                <span class="stat-value utility" id="stat-utility">--</span>
                <div class="progress-track">
                    <div class="progress-fill utility" id="bar-utility"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Global Infection Rate</span>
                <span class="stat-value infected" id="stat-infected">--</span>
                <div class="progress-track">
                    <div class="progress-fill infected" id="bar-infected"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Deaths</span>
                <span class="stat-value deaths" id="stat-deaths">--</span>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">Coordinator Log</div>
            <div class="log-feed" id="log-feed"></div>
        </div>

        <div class="log-section">
            <div class="log-header">Virus Log</div>
            <div class="log-feed" id="virus-feed"></div>
        </div>

        <div class="panel-footer">
            <span>TICK: <span id="footer-tick">--</span></span>
            <span>VAC: <span id="footer-vac">--</span></span>
            <span>EVO: <span id="footer-evo">--</span></span>
        </div>
    </div>


</body>
</html>
