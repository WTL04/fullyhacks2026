<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pathogen Response System - Skeleton</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/dark/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <script type="module">
        import { initMapMarkers } from './map_handler.js';
        
        const [Map, SceneView] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/SceneView.js",
        ]);

        const map = new Map({
            basemap: "oceans",
            ground: "world-elevation",
        });

        const view = new SceneView({
            container: "viewDiv",
            map: map,
            camera: {
                position: {
                    spatialReference: { latestWkid: 3857, wkid: 102100 },
                    x: -11262192.883555487,
                    y: 2315246.351026253,
                    z: 18161244.728082635,
                },
                heading: 0,
                tilt: 0.49,
            },
            viewingMode: "global",
            environment: {
                background: { type: "color", color: [10, 14, 26, 1] },
                atmosphereEnabled: true,
                starsEnabled: true
            },
            ui: { components: [] }
        });
        
        // Initialize map markers when view is ready
        view.when(() => {
            initMapMarkers(view);
        });
        
        // Expose view globally for other modules
        window.arcgisView = view;
    </script>

    <script type="module" src="socket_handler.js"></script>
    <script type="module" src="ui_updates.js"></script>
    <script type="module" src="opening_screen.js"></script>
    <script type="module" src="simulation_controls.js"></script>
</head>

<body>
    <div id="viewDiv"></div>

    <!-- Simulation Controls (shown during simulation) -->
    <div id="simulationControls" style="position: fixed; bottom: 20px; left: 20px; z-index: 999; display: flex; gap: 10px;">

        <button id="pauseResumeBtn" style="background: rgba(234, 179, 8, 0.2); border: 1px solid #eab308; color: #eab308; padding: 10px 20px; font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 4px;">
            PAUSE
        </button>
        <button id="resetBtn" style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px 20px; font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 4px;">
            RESET
        </button>
    </div>

    <div id="sidePanel">
        <div class="panel-header">Pathogen Response System</div>

        <div class="stats-section">
            <div class="stat-row">
                <span class="stat-label">Utility Score</span>
                <span class="stat-value utility" id="stat-utility">--</span>
                <div class="progress-track">
                    <div class="progress-fill utility" id="bar-utility"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Global Infection Rate</span>
                <span class="stat-value infected" id="stat-infected">--</span>
                <div class="progress-track">
                    <div class="progress-fill infected" id="bar-infected"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Deaths</span>
                <span class="stat-value deaths" id="stat-deaths">--</span>
            </div>
        </div>

        <!-- Country Data Section -->
        <div class="countries-section" id="countriesSection">
            <div class="log-header">Country Status</div>
            <div class="countries-list" id="countriesList">
                <!-- Country cards will be populated by JavaScript -->
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">Coordinator Log</div>
            <div class="log-feed" id="log-feed"></div>
        </div>

        <div class="log-section">
            <div class="log-header">Virus Log</div>
            <div class="log-feed" id="virus-feed"></div>
        </div>

        <div class="panel-footer">
            <button id="virusShopBtn" style="background: rgba(168, 85, 247, 0.2); border: 1px solid #a855f7; color: #a855f7; padding: 4px 8px; font-family: monospace; font-size: 10px; cursor: pointer; border-radius: 4px; margin-right: 10px;">VIRUS SHOP</button>
            <span>DAY: <span id="footer-day">--</span></span>
            <span>VAC: <span id="footer-vac">--</span></span>
            <span>EVO: <span id="footer-evo">--</span></span>
        </div>

    </div>


    <!-- Virus Shop Popup -->
    <div id="virusShopPopup" class="shop-overlay hidden">
        <div class="shop-container">
            <div class="shop-header">
                <h2>VIRUS SHOP</h2>
                <div class="shop-evo-display">EVO: <span id="shop-evo-value">--</span></div>
                <button id="closeShopBtn">&times;</button>
            </div>
            <div class="shop-content">
                <div class="shop-item">
                    <div class="shop-item-info">
                        <span class="shop-item-name">Virus Jump</span>
                        <span class="shop-item-cost">25 EVO</span>
                    </div>
                    <div class="shop-item-action">
                        <select id="jumpCountrySelect"></select>
                        <button id="jumpBtn">JUMP</button>
                    </div>
                </div>
                <div class="shop-item">
                    <div class="shop-item-info">
                        <span class="shop-item-name">Force Mutation</span>
                        <span class="shop-item-cost">30 EVO</span>
                    </div>
                    <div class="shop-item-action">
                        <button id="mutateBtn">MUTATE</button>
                    </div>
                </div>
                <div id="shopResult" class="shop-result"></div>
            </div>
        </div>
    </div>

</body>
</html>
