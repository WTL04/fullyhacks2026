<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Pathogen Response System - Skeleton</title>
    
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/dark/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary:   #0a0e1a;
            --bg-panel:     #111827;
            --border:       #1e2d45;
            --accent-blue:  #3b82f6;
            --accent-red:   #ef4444;
            --accent-green: #22c55e;
            --accent-yellow:#eab308;
            --text-primary: #f1f5f9;
            --text-muted:   #64748b;
            --font:         'Share Tech Mono', monospace;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
            font-family: var(--font);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Map Container */
        #viewDiv {
            flex: 1; 
            height: 100%;
        }

        /* Side Panel */
        #sidePanel {
            width: 450px; /* Fixed width prevents resizing issues when logs populate */
            height: 100%;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Panel Header */
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 3px;
            font-size: 11px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        /* Stats Section */
        .stats-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .stat-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 22px;
            letter-spacing: 1px;
        }

        .stat-value.utility  { color: var(--accent-blue); }
        .stat-value.infected { color: var(--accent-yellow); }
        .stat-value.deaths   { color: var(--accent-red); }

        .progress-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
            width: 0%; /* Default empty state */
        }

        .progress-fill.utility {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
        }

        .progress-fill.infected {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red));
        }

        /* Log Section */
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            padding: 12px 20px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .log-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* These log entry classes are provided for your backend to template */
        .log-entry {
            border-left: 2px solid var(--border);
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .log-entry.active { border-left-color: var(--accent-blue); }
        .log-tick { font-size: 10px; color: var(--accent-blue); letter-spacing: 1px; }
        .log-thought { font-size: 11px; color: var(--text-primary); line-height: 1.5; }
        .log-actions { font-size: 10px; color: var(--accent-yellow); line-height: 1.6; }

        /* Panel Footer */
        .panel-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }

        /* Custom Scrollbar */
        .log-feed::-webkit-scrollbar { width: 3px; }
        .log-feed::-webkit-scrollbar-track { background: transparent; }
        .log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <script type="module">
        const [Map, SceneView] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/SceneView.js",
        ]);

        const map = new Map({
            basemap: "oceans",
            ground: "world-elevation",
        });

        const view = new SceneView({
            container: "viewDiv",
            map: map,
            camera: {
                position: {
                    spatialReference: { latestWkid: 3857, wkid: 102100 },
                    x: -11262192.883555487,
                    y: 2315246.351026253,
                    z: 18161244.728082635,
                },
                heading: 0,
                tilt: 0.49,
            },
            viewingMode: "global",
            environment: {
                background: { type: "color", color: [10, 14, 26, 1] },
                atmosphereEnabled: true,
                starsEnabled: true
            },
            ui: { components: [] } /* Removes default zoom controls for a cleaner UI */
        });

        // Backend integration logic will go here
    </script>
</head>

<body>
    <div id="viewDiv"></div>
    
    <div id="sidePanel">
        <div class="panel-header">⬡ Pathogen Response System</div>

        <div class="stats-section">
            <div class="stat-row">
                <span class="stat-label">Utility Score</span>
                <span class="stat-value utility" id="stat-utility">--</span>
                <div class="progress-track">
                    <div class="progress-fill utility" id="bar-utility"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Global Infection Rate</span>
                <span class="stat-value infected" id="stat-infected">--</span>
                <div class="progress-track">
                    <div class="progress-fill infected" id="bar-infected"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Deaths</span>
                <span class="stat-value deaths" id="stat-deaths">--</span>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">◈ Coordinator Log</div>
            <div class="log-feed" id="log-feed"></div>
        </div>

        <div class="panel-footer">
            <span>TICK: <span id="footer-tick">--</span></span>
            <span>VAC: <span id="footer-vac">--</span></span>
            <span>EVO: <span id="footer-evo">--</span></span>
        </div>
    </div>
</body>
</html>
