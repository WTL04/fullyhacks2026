<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Pathogen Response System - Skeleton</title>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/dark/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary:   #0a0e1a;
            --bg-panel:     #111827;
            --border:       #1e2d45;
            --accent-blue:  #3b82f6;
            --accent-red:   #ef4444;
            --accent-green: #22c55e;
            --accent-yellow:#eab308;
            --accent-purple:#a855f7;
            --text-primary: #f1f5f9;
            --text-muted:   #64748b;
            --font:         'Share Tech Mono', monospace;
        }

        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
            font-family: var(--font);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        #viewDiv {
            flex: 1;
            height: 100%;
        }

        #sidePanel {
            width: 450px;
            height: 100%;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 3px;
            font-size: 11px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        .stats-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .stat-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 22px;
            letter-spacing: 1px;
        }

        .stat-value.utility  { color: var(--accent-blue); }
        .stat-value.infected { color: var(--accent-yellow); }
        .stat-value.deaths   { color: var(--accent-red); }

        .progress-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
            width: 0%;
        }

        .progress-fill.utility {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
        }

        .progress-fill.infected {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red));
        }

        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-header {
            padding: 12px 20px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .log-feed {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            border-left: 2px solid var(--border);
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-entry.active { border-left-color: var(--accent-blue); }
        .log-entry.virus { border-left-color: var(--accent-purple); }
        .log-tick { font-size: 10px; color: var(--accent-blue); letter-spacing: 1px; }
        .log-tick.virus { color: var(--accent-purple); }
        .log-thought { font-size: 11px; color: var(--text-primary); line-height: 1.5; white-space: pre-wrap; }
        .log-message { font-size: 11px; color: var(--text-primary); line-height: 1.5; }
        .log-actions { font-size: 10px; color: var(--accent-yellow); line-height: 1.6; margin-top: 4px; }
        .log-actions span { display: inline-block; background: rgba(234, 179, 8, 0.15); padding: 2px 6px; border-radius: 3px; margin-right: 4px; }
        .log-message.mutation { color: var(--accent-purple); }
        .log-message.deploy { color: var(--accent-red); }

        .panel-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }

        .log-feed::-webkit-scrollbar { width: 3px; }
        .log-feed::-webkit-scrollbar-track { background: transparent; }
        .log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>

    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <script type="module">
        const [Map, SceneView] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/SceneView.js",
        ]);

        const map = new Map({
            basemap: "oceans",
            ground: "world-elevation",
        });

        const view = new SceneView({
            container: "viewDiv",
            map: map,
            camera: {
                position: {
                    spatialReference: { latestWkid: 3857, wkid: 102100 },
                    x: -11262192.883555487,
                    y: 2315246.351026253,
                    z: 18161244.728082635,
                },
                heading: 0,
                tilt: 0.49,
            },
            viewingMode: "global",
            environment: {
                background: { type: "color", color: [10, 14, 26, 1] },
                atmosphereEnabled: true,
                starsEnabled: true
            },
            ui: { components: [] }
        });
    </script>

    <script>
        const socket = io();

        socket.on('connect', () => {
            console.log('Socket connected:', socket.id);
        });

        socket.on('state_update', (data) => {
            if (!data) return;
            if (data.utility_score != null) {
                document.getElementById('stat-utility').innerText = data.utility_score.toFixed(3);
                document.getElementById('bar-utility').style.width = `${data.utility_score * 100}%`;
            }
            if (data.global_infected != null) {
                document.getElementById('stat-infected').innerText = `${(data.global_infected * 100).toFixed(2)}%`;
                document.getElementById('bar-infected').style.width = `${data.global_infected * 100}%`;
            }
            if (data.countries) {
                const totalDeaths = Object.values(data.countries).reduce((sum, c) => sum + (c.dead || 0), 0);
                document.getElementById('stat-deaths').innerText = totalDeaths.toLocaleString();
            }
            if (data.tick != null) document.getElementById('footer-tick').innerText = data.tick;
            if (data.global_vaccine_progress != null) document.getElementById('footer-vac').innerText = data.global_vaccine_progress.toFixed(2);
            if (data.evolution_points != null) document.getElementById('footer-evo').innerText = data.evolution_points;
        });

        socket.on('action_results', (data) => {
            const feed = document.getElementById('log-feed');
            const { thought, actions, tick } = data;
            const entry = document.createElement('div');
            entry.className = 'log-entry active';
            let html = `<div class="log-tick">TICK ${tick}</div>`;
            if (thought) html += `<div class="log-thought">${thought}</div>`;
            if (actions && actions.length) {
                html += `<div class="log-actions">`;
                actions.forEach(a => {
                    html += `<span>${a.type} ${a.target}</span>`;
                });
                html += `</div>`;
            }
            entry.innerHTML = html;
            feed.prepend(entry);
        });

        socket.on('virus_log', (data) => {
            const feed = document.getElementById('virus-feed');
            const { tick, message, type } = data;
            const entry = document.createElement('div');
            entry.className = `log-entry virus`;
            const colorClass = type === 'mutation' ? 'mutation' : 'deploy';
            entry.innerHTML = `<div class="log-tick virus">TICK ${tick}</div><div class="log-message ${colorClass}">${message}</div>`;
            feed.prepend(entry);
        });

        function sendAction(type, target, value) {
            socket.emit('user_action', { type, target, value });
        }
    </script>
</head>

<body>
    <div id="viewDiv"></div>

    <div id="sidePanel">
        <div class="panel-header">Pathogen Response System</div>

        <div class="stats-section">
            <div class="stat-row">
                <span class="stat-label">Utility Score</span>
                <span class="stat-value utility" id="stat-utility">--</span>
                <div class="progress-track">
                    <div class="progress-fill utility" id="bar-utility"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Global Infection Rate</span>
                <span class="stat-value infected" id="stat-infected">--</span>
                <div class="progress-track">
                    <div class="progress-fill infected" id="bar-infected"></div>
                </div>
            </div>
            <div class="stat-row">
                <span class="stat-label">Total Deaths</span>
                <span class="stat-value deaths" id="stat-deaths">--</span>
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">Coordinator Log</div>
            <div class="log-feed" id="log-feed"></div>
        </div>

        <div class="log-section">
            <div class="log-header">Virus Log</div>
            <div class="log-feed" id="virus-feed"></div>
        </div>

        <div class="panel-footer">
            <span>TICK: <span id="footer-tick">--</span></span>
            <span>VAC: <span id="footer-vac">--</span></span>
            <span>EVO: <span id="footer-evo">--</span></span>
        </div>
    </div>
</body>
</html>
